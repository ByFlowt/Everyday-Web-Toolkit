name: Deploy to GitHub Pages

on:
    push:
        branches:
            - main

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment:
            name: Site-Passwords
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Inject password
              env:
                USERS_JSON: ${{ secrets.USERS }}
              run: |
                # Create a temporary script to do the replacement safely instead of relying on basic sed
                # This treats the secret as pure text and doesn't care about quotes/brackets
                node -e "
                  const fs = require('fs');
                  let html = fs.readFileSync('index.html', 'utf8');
                  // We expect the environment variable USERS_JSON to hold the exact string
                  const jsonString = process.env.USERS_JSON || '{}';
                  html = html.replace('\'USERS_PLACEHOLDER\'', '\`' + jsonString + '\`');
                  fs.writeFileSync('index.html', html);
                "
                echo "Injection complete."

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: .

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
