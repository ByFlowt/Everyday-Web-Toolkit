name: Deploy to GitHub Pages

on:
    push:
        branches:
            - main

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Check and Inject Secret
              env:
                  USERS_JSON: ${{ secrets.USERS }}
              run: |
                  echo "Checking if secret exists..."
                  if [ -z "$USERS_JSON" ]; then
                    echo "ERROR: The USERS secret is completely empty or not accessible by this job!"
                  else
                    echo "SUCCESS: The USERS secret was found (length: ${#USERS_JSON} characters)."
                  fi

                  node -e "
                    const fs = require('fs');
                    let html = fs.readFileSync('index.html', 'utf8');
                    const jsonString = process.env.USERS_JSON || '{}';
                    
                    if (html.includes('\'USERS_PLACEHOLDER\'')) {
                       console.log('Placeholder found in HTML, replacing...');
                       html = html.replace('\'USERS_PLACEHOLDER\'', '\`' + jsonString + '\`');
                       fs.writeFileSync('index.html', html);
                    } else {
                       console.log('ERROR: Placeholder NOT found in HTML!');
                    }
                  "

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: .

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
